<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Slides</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        :root {
            --primary-color: #00b7af;
            --dark-bg: #10181f;
            --text-light: #ffffff;
            --animation-duration: 1s;
            --slide-pause: 3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8vw;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            transform: translateX(100%);
            opacity: 0;
            color: var(--primary-color);
        }

        /* Slide animations */
        .slide-in {
            animation: slideIn var(--animation-duration) forwards ease-out;
        }

        .slide-out {
            animation: slideOut var(--animation-duration) forwards ease-in;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(-100%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="slide1" class="slide">Hello World</div>
        <div id="slide2" class="slide">I'm here!</div>
    </div>

    <script>
        const slide1 = document.getElementById('slide1');
        const slide2 = document.getElementById('slide2');

        const animationDuration = 1000;
        const pauseDuration = 3000;

        async function playSlides() {
            while (true) {
                // Slide 1 In
                slide1.classList.remove('slide-out');
                slide1.classList.add('slide-in');
                await new Promise(r => setTimeout(r, animationDuration + pauseDuration));

                // Slide 1 Out
                slide1.classList.remove('slide-in');
                slide1.classList.add('slide-out');
                await new Promise(r => setTimeout(r, animationDuration));

                // Slide 2 In
                slide2.classList.remove('slide-out');
                slide2.classList.add('slide-in');
                await new Promise(r => setTimeout(r, animationDuration + pauseDuration));

                // Slide 2 Out
                slide2.classList.remove('slide-in');
                slide2.classList.add('slide-out');
                await new Promise(r => setTimeout(r, animationDuration));
            }
        }

        window.addEventListener('DOMContentLoaded', playSlides);
    </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
